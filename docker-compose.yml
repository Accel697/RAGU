version: '3.8'

services:
  knb-demo:
    image: apache/age:release_PG15_1.6.0
    container_name: knb-demo
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - age_data:/var/lib/postgresql/data

  vllm-demo:
    image: ollama/ollama:latest
    container_name: vllm-demo
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_KEEP_ALIVE=5m
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"

  grg-demo:
    build:
      context: .
      dockerfile: examples/fastapi_demo/Dockerfile
    container_name: grg-demo
    env_file:
      - .env
    depends_on:
      - knb-demo
      - vllm-demo
    environment:
      AGE_HOST: knb-demo
      AGE_PORT: "5432"
      AGE_DB: ${DB_NAME}
      AGE_USER: ${DB_USER}
      AGE_PASSWORD: ${DB_PASSWORD}
      GRAPH_NAME: ${GRAPH_NAME}
      OLLAMA_BASE_URL: http://vllm-demo:11434/v1
      OLLAMA_API: http://vllm-demo:11434
      LLM_MODEL: qwen2.5:3b
      EMBED_MODEL: nomic-embed-text:latest
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ragu_working_dir:/app/ragu_working_dir
      - llm_cache:/app/llm_cache
        
  web-demo:
    build:
      context: .
      dockerfile: examples/webchat_demo/Dockerfile
    container_name: web-demo
    environment:
      - RAGU_API_URL=http://grg-demo:8000
    depends_on:
      - grg-demo
    ports:
      - "8080:8080"

volumes:
  age_data:
  ollama_data:
  ragu_working_dir:
  llm_cache: