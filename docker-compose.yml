version: '3.8'

services:
  knb:
    image: apache/age:release_PG15_1.6.0
    container_name: knb
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - age_data:/var/lib/postgresql/data

  vllm:
    image: ollama/ollama:latest
    container_name: vllm
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_NUM_CTX=8192
      - OLLAMA_KEEP_ALIVE=10m
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"

  grg:
    build:
      context: .
      dockerfile: services/grg/Dockerfile
    container_name: grg
    env_file:
      - .env
    depends_on:
      - knb
      - vllm
    environment:
      AGE_HOST: knb
      AGE_PORT: "5432"
      AGE_DB: ${DB_NAME}
      AGE_USER: ${DB_USER}
      AGE_PASSWORD: ${DB_PASSWORD}
      GRAPH_NAME: ${GRAPH_NAME}
      OLLAMA_BASE_URL: http://vllm:11434/v1
      OLLAMA_API: http://vllm:11434
      LLM_MODEL: qwen2.5:3b
      EMBED_MODEL: bge-m3
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ragu_working_dir:/app/ragu_working_dir
      - llm_cache:/app/llm_cache

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    container_name: web
    environment:
      - RAGU_API_URL=http://grg:8000
    depends_on:
      - grg
    ports:
      - "8080:8080"

  xdt:
    build:
      context: .
      dockerfile: services/xdt/xdt_mgr/Dockerfile
    container_name: xdt
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    ports:
      - "8081:8081"

volumes:
  age_data:
  ollama_data:
  ragu_working_dir:
  llm_cache: